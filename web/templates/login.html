<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Go File Manager - Giriş">
    <title>Giriş - Go File Manager</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-page">
    <div class="login-bg"></div>
    <div class="login-card">
        <div class="login-logo">📁</div>
        <h1 class="login-title">Go File Manager</h1>
        <p class="login-subtitle">Dosya yönetim paneline giriş yapın</p>

        {{if .Error}}
        <div class="login-error">
            <span>⚠</span>
            <span>{{.Error}}</span>
        </div>
        {{end}}

        <form action="/login" method="POST" id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">Kullanıcı Adı</label>
                <input type="text" class="form-input" id="username" name="username"
                       placeholder="Kullanıcı adınızı girin" required autofocus autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Şifre</label>
                <input type="password" class="form-input" id="password" name="password"
                       placeholder="Şifrenizi girin" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
                Giriş Yap
            </button>
        </form>
    </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script src="/static/js/app.js"></script>
</body>
</html>
